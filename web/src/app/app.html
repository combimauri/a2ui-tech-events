<header class="app-bar">
  <a class="brand" routerLink="/">
    <span class="brand-mark" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <path d="M16 2v4M8 2v4M3 10h18" />
      </svg>
    </span>
    TechEvents
  </a>

  <nav class="app-nav">
    <button
      type="button"
      class="icon-btn"
      (click)="toggleTheme()"
      [attr.aria-label]="theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      [title]="theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      @if (theme() === 'dark') {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" />
        </svg>
      }
    </button>

    @if (signedIn()) {
      @if (isAdmin()) {
        <a class="a2ui-btn" routerLink="/create" routerLinkActive="active">+ Create</a>
      }
      <span class="who" title="Signed in as {{ email() }}">{{ email() }}</span>
      <button type="button" class="link-btn" (click)="signOut()">Sign out</button>
    } @else {
      <a class="nav-link" routerLink="/login" routerLinkActive="active">Sign in</a>
    }
  </nav>
</header>

<main>
  <router-outlet />
</main>
